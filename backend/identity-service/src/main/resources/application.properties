# Server Port (Keep standard for local testing)
server.port=8081

# ---------------------------------------------------------
# DYNAMIC AWS AURORA DATABASE CONFIGURATION
# ---------------------------------------------------------
# The shell scripts will automatically populate these variables in the cloud
# For AWS Lambda: Uses SSL with proper RDS certificate validation
# For Local Development: Falls back to SSL with no certificate validation
spring.datasource.url=jdbc:postgresql://ep-gentle-sun-anr0hz63-pooler.c-6.us-east-1.aws.neon.tech/employee_db?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_JYKXu9e8tDQn
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep these optimized for Lambda
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=0
spring.jpa.hibernate.ddl-auto=update

# AWS Lambda & High-Performance Connection Pool Configuration
# These settings optimize for AWS Lambda cold starts and connection efficiency
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000


# Let Hibernate manage the tables automatically
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Application timeout settings for Lambda
server.tomcat.connection-timeout=10000
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s


# ---------------------------------------------------------
# CONNECTION POOL - CRITICAL FOR LAMBDA & HIGH LOAD
# ---------------------------------------------------------
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.leak-detection-threshold=60000

# ---------------------------------------------------------
# HIBERNATE CONFIGURATION - OPTIMIZED FOR LAMBDA
# ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.use_scrollable_resultset=false

# ---------------------------------------------------------
# TOMCAT & SERVER CONFIGURATION - LAMBDA OPTIMIZED
# ---------------------------------------------------------
server.tomcat.connection-timeout=10000
server.tomcat.accept-count=10
server.tomcat.max-threads=10
server.tomcat.min-spare-threads=1
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s

# ---------------------------------------------------------
# LOGGING - MINIMAL FOR LAMBDA
# ---------------------------------------------------------
logging.level.root=WARN
logging.level.com.example=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.postgresql=WARN

# ---------------------------------------------------------
# APPLICATION CONFIGURATION
# ---------------------------------------------------------
spring.application.name=performance-service
server.error.include-message=always
server.error.include-binding-errors=always